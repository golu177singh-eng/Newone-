<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Riya</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:linear-gradient(135deg,#ff5fa2,#ffd1e8);
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
}

#loader{
position:absolute;
width:100%;
height:100%;
background:#ff5fa2;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
color:#fff;
transition:1s;
}

.loader-heart{
font-size:70px;
animation:beat .8s infinite;
}

@keyframes beat{
50%{
transform:scale(1.2);
}
}

#welcome{
display:none;
text-align:center;
color:white;
animation:fade 2s;
}

h1{
font-size:50px;
}

p{
margin-top:15px;
font-size:20px;
}

button{
margin-top:35px;
padding:15px 40px;
font-size:18px;
border:none;
border-radius:40px;
background:white;
color:#ff2f7d;
cursor:pointer;
font-weight:bold;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}
</style>
</head>

<body>

<div id="loader">
<div class="loader-heart">❤️</div>
<h2>Preparing Your Surprise...</h2>
</div>

<div id="welcome">
<h1>🎂 Happy Birthday, Riya 🎂</h1>
<p>A little surprise is waiting for you...</p>

<button onclick="nextPage()">
Open Surprise 💖
</button>
</div>

<script>

setTimeout(()=>{
loader.style.display="none";
welcome.style.display="block";
},3000);

function nextPage(){
document.body.innerHTML=`

<style>

body{
margin:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#ffb6d9,#ffddee);
overflow:hidden;
font-family:Poppins,sans-serif;
}

.envelope{
position:relative;
width:320px;
height:220px;
background:#ff4f8b;
border-radius:10px;
cursor:pointer;
box-shadow:0 20px 40px rgba(0,0,0,.25);
}

.flap{
position:absolute;
top:0;
left:0;
width:0;
height:0;
border-left:160px solid transparent;
border-right:160px solid transparent;
border-top:110px solid #ff7cab;
transform-origin:top;
transition:1s;
z-index:5;
}

.letter{
position:absolute;
width:90%;
height:240px;
background:white;
left:5%;
top:20px;
border-radius:15px;
padding:20px;
transition:1s;
z-index:1;
overflow:hidden;
text-align:center;
}

.envelope.open .flap{
transform:rotateX(180deg);
}

.envelope.open .letter{
top:-220px;
}

.letter h2{
color:#ff2f7d;
margin-bottom:15px;
}

.letter p{
font-size:15px;
line-height:28px;
color:#555;
}

#memoriesBtn{
margin-top:20px;
padding:12px 30px;
border:none;
border-radius:30px;
background:#ff2f7d;
color:white;
font-size:17px;
cursor:pointer;
display:none;
}

.heart{
position:absolute;
font-size:25px;
animation:fly 8s linear infinite;
pointer-events:none;
}

@keyframes fly{

0%{
transform:translateY(100vh) scale(.5);
opacity:1;
}

100%{
transform:translateY(-120px) scale(1.5);
opacity:0;
}

}

</style>

<div class="envelope" onclick="openLetter()" id="env">

<div class="flap"></div>

<div class="letter">

<h2>Dear Riya ❤️</h2>

<p id="typing"></p>

</div>

</div>

<button id="memoriesBtn" onclick="showGallery()">
❤️ View Memories
</button>

<audio id="bgMusic" loop autoplay>
    <source src="music.mp3" type="audio/mpeg">
</audio>

`;
}

function openLetter(){

let env=document.getElementById("env");

env.classList.add("open");

let text=`Today is your special day.

I wish you endless happiness, beautiful memories and lots of smiles.

May every dream of yours come true.

Stay blessed.

Happy Birthday, Riya ❤️`;

let i=0;

let speed=45;

function type(){

if(i<text.length){

document.getElementById("typing").innerHTML+=text.charAt(i);

i++;

setTimeout(type,speed);

}

}

type();

}

setTimeout(()=>{
document.getElementById("memoriesBtn").style.display="inline-block";
},7000);

setInterval(createHeart,300);

}

function createHeart(){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(20+Math.random()*30)+"px";

heart.style.animationDuration=(5+Math.random()*4)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},9000);

}

function showGallery(){

document.body.innerHTML=`

<style>

body{
background:#fff0f7;
font-family:Poppins,sans-serif;
text-align:center;
padding:30px;
}

h1{
color:#ff2f7d;
margin-bottom:30px;
}

.gallery{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}

.gallery img{
width:220px;
height:280px;
object-fit:cover;
border-radius:20px;
box-shadow:0 10px 20px rgba(0,0,0,.2);
}

#finalBtn{
padding:15px 40px;
font-size:18px;
background:#ff2f7d;
color:white;
border:none;
border-radius:40px;
cursor:pointer;
margin-top:40px;
}

</style>

<h1>📸 Our Beautiful Memories ❤️</h1>

<div class="gallery">

<img src="photo1.jpg">
<img src="photo2.jpg">
<img src="photo3.jpg">
<img src="photo4.jpg">

</div>

<br><br>

<button onclick="finalSurprise()" id="finalBtn">
🎁 Final Surprise
</button>

`;

}

function finalSurprise(){

document.body.innerHTML=`

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
overflow:hidden;
background:linear-gradient(135deg,#ff5fa2,#ff9cc8,#ffd9ea);
font-family:Poppins,sans-serif;
color:white;
text-align:center;
}

h1{
font-size:60px;
animation:zoom 2s infinite alternate;
}

p{
font-size:22px;
max-width:700px;
padding:20px;
line-height:1.8;
}

.spark{
position:absolute;
width:8px;
height:8px;
border-radius:50%;
background:white;
animation:blast 2s linear forwards;
}

@keyframes blast{

0%{
transform:translate(0,0) scale(1);
opacity:1;
}

100%{
transform:translate(var(--x),var(--y)) scale(0);
opacity:0;
}

}

@keyframes zoom{

from{
transform:scale(1);
}

to{
transform:scale(1.08);
}

}

</style>

<h1>🎉 Happy Birthday, Riya 🎉</h1>

<p>

May your life always be filled with happiness,
love, success and beautiful memories.

Keep smiling forever.

Have an amazing birthday! ❤️

</p>

`;

setInterval(fireworks,250);

}

function fireworks(){

for(let i=0;i<25;i++){

let s=document.createElement("div");

s.className="spark";

s.style.left=Math.random()*window.innerWidth+"px";

s.style.top=Math.random()*window.innerHeight+"px";

s.style.setProperty("--x",(Math.random()*300-150)+"px");

s.style.setProperty("--y",(Math.random()*300-150)+"px");

document.body.appendChild(s);

setTimeout(()=>{

s.remove();

},2000);

}

}

</script>

</body>
</html>
